name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: sortify-windows.exe
          - os: macos-latest
            target: macos
            artifact_name: Sortify-macos.zip
          - os: ubuntu-latest
            target: linux
            artifact_name: sortify-linux.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install appimagetool (Linux)
        if: matrix.target == 'linux'
        run: |
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Build app
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: python scripts/build.py --target ${{ matrix.target }}

      - name: Package macOS app
        if: matrix.target == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Sortify-macos.app Sortify-macos.zip

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare files list
        run: |
          mkdir -p release-files
          cp release-artifacts/windows-artifact/sortify-windows.exe release-files/
          cp release-artifacts/macos-artifact/Sortify-macos.zip release-files/
          cp release-artifacts/linux-artifact/sortify-linux.AppImage release-files/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/sortify-windows.exe
            release-files/Sortify-macos.zip
            release-files/sortify-linux.AppImage
          generate_release_notes: true
